# Netlify config for tally.nickward.co.uk
#
# The Vite build outputs a static SPA to dist/client. The API lives on the Pi,
# exposed via Tailscale Funnel at https://pi5.tailecb90f.ts.net/tally/api/*.
# Netlify proxies `/api/*` requests through to the Pi — same-origin from the
# browser's perspective so no CORS headers needed.

[build]
  command = "npm install && npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"

# Proxy /api/* calls to the Pi backend (path prefix stripped by Pi's API_PREFIX)
[[redirects]]
  from = "/api/*"
  to = "https://pi5.tailecb90f.ts.net/tally/api/:splat"
  status = 200
  force = true

# Proxy receipt file requests (image serving endpoint)
[[redirects]]
  from = "/receipts/*"
  to = "https://pi5.tailecb90f.ts.net/tally/receipts/:splat"
  status = 200
  force = true

# SPA fallback — everything else serves index.html so client-side routing works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
